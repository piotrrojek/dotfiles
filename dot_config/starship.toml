"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ŅéČ](red)\
$os\
$username\
[Ņé░](bg:peach fg:red)\
$directory\
[Ņé░](bg:yellow fg:peach)\
$git_branch\
$git_status\
[Ņé░](fg:yellow bg:teal)\
$kubernetes\
$container\
$docker_context\
[Ņé░](fg:teal bg:green)\
$golang\
$nodejs\
$python\
[Ņé░](fg:green bg:sapphire)\
$conda\
[Ņé░](fg:sapphire bg:lavender)\
$time\
[Ņé┤ ](fg:lavender)\
$cmd_duration\
$direnv\
$jobs\
$status\
$line_break\
$character"""

palette = 'catppuccin_frappe'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Macos = "¾░ĆĄ"
Linux = "¾░īĮ"
Ubuntu = "¾░Ģł"
Debian = "¾░ŻÜ"
Alpine = ""
Arch = "¾░Żć"
Fedora = "¾░Żø"
Raspbian = "¾░É┐"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

# ---------------------------------------------------------------------------
# Cluster / container awareness (teal segment)
# ---------------------------------------------------------------------------
[kubernetes]
disabled = false
symbol = "ŌśĖ "
style = "bg:teal"
format = '[[ $symbol$context( \($namespace\)) ](fg:crust bg:teal)]($style)'
# Show whenever you're in a project that smells like k8s, OR KUBECONFIG is set.
detect_files = [
    "Chart.yaml", "Chart.yml",
    "kustomization.yaml", "kustomization.yml",
    "helmfile.yaml", "helmfile.yml",
    "skaffold.yaml",
    "k8s.yaml", "k8s.yml",
    "Tiltfile",
]
detect_folders = ["k8s", "kubernetes", "manifests", "helm"]
detect_env_vars = ["KUBECONFIG"]

[container]
symbol = "Ō¼ó "
style = "bg:teal"
format = '[[ $symbol\[$name\] ](fg:crust bg:teal)]($style)'

[docker_context]
symbol = "’īł"
style = "bg:teal"
format = '[[ $symbol $context ](fg:crust bg:teal)]($style)'
only_with_files = false

# ---------------------------------------------------------------------------
# Language runtimes (green segment) ŌĆö keep only go, node, python
# ---------------------------------------------------------------------------
[golang]
symbol = "Ņś¦"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "Ņśå"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[conda]
symbol = " ’äī "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

# ---------------------------------------------------------------------------
# Right side: time, duration, env/state indicators
# ---------------------------------------------------------------------------
[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ ’É║ $time ](fg:crust bg:lavender)]($style)'

[cmd_duration]
show_milliseconds = true
format = " Ņ½┤ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[direnv]
disabled = false
symbol = "direnv "
style = "fg:yellow"
format = "[$symbol$loaded/$allowed]($style) "

[jobs]
symbol = "ŌÅĄ "
number_threshold = 1
format = "[$symbol$number]($style) "
style = "fg:sapphire"

[status]
disabled = false
symbol = "Ō£ś "
success_symbol = ""
format = '[$symbol$status]($style) '
style = "fg:red"
map_symbol = true

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:green)'
error_symbol = '[ŌØ»](bold fg:red)'
vimcmd_symbol = '[ŌØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:yellow)'

# ---------------------------------------------------------------------------
# Palette
# ---------------------------------------------------------------------------
[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo = "#eebebe"
